<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A1 Auto Detailing | Pricing</title>
    <meta
      name="description"
      content="Detail packages and tiered pricing from A1 Auto Detailing."
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header id="site-header" class="site-header"></header>
    <main>
      <section>
        <div class="site-wrap">
          <h1>Detail Packages</h1>
          <p class="subhead">
            Pick the package that fits your vehicle goals. Need help deciding? Reach out and we
            can recommend the right level.
          </p>
          <div id="pricing-grid" class="grid pricing-grid" aria-live="polite"></div>
        </div>
      </section>

      <section>
        <div class="site-wrap">
          <h2>Pricing Flyer</h2>
          <img
            class="flyer"
            src="assets/pricing_flyer.jpeg"
            alt="A1 Auto Detailing pricing flyer"
            loading="lazy"
          />
        </div>
      </section>
    </main>
    <footer id="site-footer" class="site-footer"></footer>
    <script type="module" src="scripts/main.js"></script>
    <script type="module" src="scripts/pricing.js"></script>
  </body>
</html>
